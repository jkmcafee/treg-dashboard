<script>
function money(v) {
  if (v === undefined || v === null || v === "") return "--";
  const n = Number(v);
  if (Number.isNaN(n)) return "--";

  return n.toLocaleString("en-US", {
    style: "currency",
    currency: "USD",
    maximumFractionDigits: 0
  });
}

function pct(v) {
  if (v === undefined || v === null || v === "") return "--";

  const n = Number(v);

  if (Number.isNaN(n)) return "--";

  return n.toFixed(2) + "%";
}

function num(v, digits = 2) {
  if (v === undefined || v === null || v === "") return "--";

  const n = Number(v);

  if (Number.isNaN(n)) return "--";

  return n.toFixed(digits);
}

function firstValue(...values) {
  for (const v of values) {
    if (v !== undefined && v !== null && v !== "") {
      return v;
    }
  }

  return null;
}

function setClassBySign(id, value, positiveIsGood = true) {

  const el = document.getElementById(id);

  if (!el) return;

  const n = Number(value);

  el.classList.remove("good", "bad");

  if (Number.isNaN(n)) return;

  if (n > 0)
    el.classList.add(
      positiveIsGood ? "good" : "bad"
    );

  if (n < 0)
    el.classList.add(
      positiveIsGood ? "bad" : "good"
    );
}

function formatDate(value) {

  if (!value) return "--";

  const d = new Date(value);

  if (Number.isNaN(d.getTime())) return "--";

  return d.toLocaleDateString("en-US", {
    month: "short",
    day: "numeric",
    year: "numeric"
  });
}

function formatDateTime(value) {

  if (!value) return "--";

  const d = new Date(value);

  if (Number.isNaN(d.getTime())) return "--";

  return d.toLocaleString("en-US", {
    month: "short",
    day: "numeric",
    hour: "numeric",
    minute: "2-digit"
  });
}

function daysSince(value) {

  if (!value) return "--";

  const d = new Date(value);

  if (Number.isNaN(d.getTime())) return "--";

  const days =
    Math.floor(
      (Date.now() - d.getTime()) / 86400000
    );

  return days + " days live";
}

function render(data) {

  //
  // IBKR JSON FORMAT
  //
  const accounts = data.accounts || {};
  const strategy = Object.values(accounts)[0];

  if (!strategy) {
    throw new Error(
      "No IBKR account found in ibkrState.json"
    );
  }

  document.getElementById("sourceBadge").innerText =
    "Source: " +
    (data.meta?.source || "IBKR");

  document.getElementById("updatedBadge").innerText =
    "Last Update from IBKR: " +
    formatDateTime(data.meta?.lastUpdated);

  //
  // Header Metrics
  //
  document.getElementById("startDate").innerText =
    formatDate(strategy.ScaledStartDate);

  document.getElementById("daysLive").innerText =
    daysSince(strategy.ScaledStartDate);

  document.getElementById("modelValue").innerText =
    money(strategy.ModelAccountValue);

  document.getElementById("startingValue").innerText =
    "Starting Value: " +
    money(strategy.ScaledStartingCash);

  document.getElementById("profit").innerText =
    money(strategy.ScaledProfit);

  document.getElementById("profitSub").innerText =
    "Scaled profit since live tracking began";

  setClassBySign(
    "profit",
    strategy.ScaledProfit
  );

  //
  // Main Stats
  //
  document.getElementById("returnPct").innerText =
    pct(strategy.ScaledReturn ?? 0);

  document.getElementById("returnNote").innerText =
    "Scaled cumulative live return";

  document.getElementById("spyReturnPct").innerText =
    pct(strategy.SP500Return ?? 0);

  document.getElementById("relativeReturnPct").innerText =
    pct(strategy.ReturnVsSP500 ?? 0);

  document.getElementById("maxDrawdownPct").innerText =
    pct(strategy.MaxDrawdown ?? 0);

  setClassBySign(
    "returnPct",
    strategy.ScaledReturn ?? 0
  );

  setClassBySign(
    "spyReturnPct",
    strategy.SP500Return ?? 0
  );

  setClassBySign(
    "relativeReturnPct",
    strategy.ReturnVsSP500 ?? 0
  );

  document
    .getElementById("maxDrawdownPct")
    .classList.add("bad");

  //
  // Table
  //
  document.getElementById("tableReturn").innerText =
    pct(strategy.ScaledReturn ?? 0);

  document.getElementById("tableSpy").innerText =
    pct(strategy.SP500Return ?? 0);

  document.getElementById("tableRelative").innerText =
    pct(strategy.ReturnVsSP500 ?? 0);

  document.getElementById("tableMaxDD").innerText =
    pct(strategy.MaxDrawdown ?? 0);

  document.getElementById("tableProfitFactor").innerText =
    num(strategy.ProfitFactor ?? 0);

  document.getElementById("tableWinPct").innerText =
    num(strategy.WinRate ?? 0, 0) + "%";

  document.getElementById("tableReturn").className =
    Number(strategy.ScaledReturn ?? 0) >= 0
      ? "good"
      : "bad";

  document.getElementById("tableSpy").className =
    Number(strategy.SP500Return ?? 0) >= 0
      ? "good"
      : "bad";

  document.getElementById("tableRelative").className =
    Number(strategy.ReturnVsSP500 ?? 0) >= 0
      ? "good"
      : "bad";

  document.getElementById("tableMaxDD").className =
    "bad";
}

async function load() {

  try {

    const r = await fetch(
      "ibkrState.json?t=" + Date.now()
    );

    if (!r.ok) {
      throw new Error(
        "Unable to load ibkrState.json"
      );
    }

    const data = await r.json();

    render(data);

  } catch (err) {

    const el =
      document.getElementById("loadError");

    el.style.display = "block";

    el.innerText =
      "Error loading ibkrState.json: " +
      err.message;
  }
}

load();

setInterval(load, 10000);

function setTheme(theme) {

  if (theme === "light") {

    document.body.classList.add("light");

    localStorage.setItem("theme", "light");

  } else {

    document.body.classList.remove("light");

    localStorage.setItem("theme", "dark");
  }
}

window.addEventListener(
  "DOMContentLoaded",
  () => {

    const savedTheme =
      localStorage.getItem("theme");

    if (savedTheme === "light") {
      document.body.classList.add("light");
    }
  }
);
</script>
