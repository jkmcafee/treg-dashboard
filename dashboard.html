<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TurboRegime Dashboard</title>

<style>
:root {
  --bg: #0b1220;
  --panel: #121a2b;
  --text: #e8eefc;
  --muted: #9fb0d1;
  --border: #24324d;
}

body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #08101d 0%, #0e1728 100%);
  color: var(--text);
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand h1 { margin: 0; }

.pill {
  padding: 18px 28px;
  border-radius: 999px;
  border: 1px solid var(--border);
  font-weight: 800;
  font-size: 1.2rem;
  min-width: 280px;
  text-align: center;
}

.pill.riskon { background: rgba(46,204,113,.15); }
.pill.riskoff { background: rgba(255,107,107,.15); }
.pill.riskpp { background: rgba(77,163,255,.15); }

.grid {
  display: grid;
  gap: 15px;
}

.grid.cards {
  grid-template-columns: repeat(3,1fr);
}

.grid.main {
  grid-template-columns: 1.3fr 1fr;
}

.card {
  background: #121a2b;
  padding: 15px;
  border-radius: 12px;
}

h3 {
  color: var(--muted);
  font-size: 14px;
}

.metric {
  font-size: 28px;
  font-weight: bold;
}

.sub {
  color: var(--muted);
}

.split {
  display:flex;
  justify-content:space-between;
  padding:6px 0;
}

.bar {
  height:10px;
  background:#222;
  border-radius:5px;
}

.bar-fill {
  height:10px;
  background:#4da3ff;
}

table {
  width:100%;
}

th, td {
  padding:8px;
  border-bottom:1px solid #333;
}

.divider {
  margin:30px 0;
  border-top:1px solid #333;
  text-align:center;
  color:var(--muted);
}

.img-wrap img {
  width:100%;
  cursor: zoom-in;
}

.zoom-overlay {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  justify-content:center;
  align-items:center;
}

.zoom-overlay img {
  max-width:95%;
  max-height:95%;
}
</style>
</head>

<body>
<div class="container">

<div class="header">
  <div class="brand">
    <h1>TurboRegime Dashboard</h1>
  </div>
  <div id="regimePill" class="pill">--</div>
</div>

<div class="grid cards">
  <div class="card">
    <h3>Regime</h3>
    <div id="regimeName" class="metric"></div>
    <div id="regimeMeta" class="sub"></div>
  </div>

  <div class="card">
    <h3>CAGR</h3>
    <div id="cagr" class="metric"></div>
    <div id="ret" class="sub"></div>
  </div>

  <div class="card">
    <h3>Last Updated</h3>
    <div id="updated"></div>
  </div>
</div>

<div class="grid main">
  <div class="card">
    <h3>Performance Summary</h3>
    <div id="period" class="sub"></div>
    <table>
      <thead>
        <tr>
          <th>Series</th><th>CAGR</th><th>UPI</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>

  <div class="card">
    <h3>Metrics</h3>
    <div id="metrics"></div>
  </div>
</div>

<div class="grid main">
  <div class="card">
    <h3>Equity</h3>
    <div class="img-wrap"><img id="eq"></div>
  </div>

  <div class="card">
    <h3>Ratio</h3>
    <div class="img-wrap"><img id="ra"></div>
  </div>
</div>

<div class="divider">Premium</div>

<div id="premium">
  <div class="grid main">
    <div class="card"><h3>Allocations</h3><div id="alloc"></div></div>
    <div class="card">
      <h3>Signal</h3>
      <div class="split"><span>Ratio</span><span id="r"></span></div>
      <div class="split"><span>MA</span><span id="ma"></span></div>
      <div class="split"><span>Delta</span><span id="d"></span></div>
    </div>
  </div>

  <div class="card">
    <h3>Reason</h3>
    <div id="reason"></div>
  </div>
</div>

</div>

<div id="zoom" class="zoom-overlay"><img id="zoomImg"></div>

<script>
const useGitHubJson = true;
const localFile = "5:03 PM 4/4/2026backtestState.JSON";
const githubFile = "https://raw.githubusercontent.com/jkmcafee/treg-dashboard/main/backtestState.json"

const file = useGitHubJson ? githubFile : localFile;

function timeSince(d){
  let s=(Date.now()-new Date(d))/1000;
  if(s<60)return s|0+"s";
  if(s<3600)return s/60|0+"m";
  return s/3600|0+"h";
}

function render(x){

  document.getElementById("regimeName").innerText=x.regime;
  document.getElementById("regimeMeta").innerText=x.regimeDays+" days";

  let pill=document.getElementById("regimePill");
  pill.innerText=x.regime;
  pill.className="pill "+x.regime.toLowerCase();

  document.getElementById("cagr").innerText=x.performance.current.cagrPct+"%";
  document.getElementById("ret").innerText="Return "+x.performance.current.totalReturnPct+"%";

  let d=x.performance.meta.lastUpdated;
  document.getElementById("updated").innerText=new Date(d).toLocaleString()+" ("+timeSince(d)+")";

  document.getElementById("period").innerText=
    x.performance.meta.startDate.split(" ")[0]+" to "+
    x.performance.meta.endDate.split(" ")[0]+
    " • "+x.performance.meta.periodYears+" yrs";

  let html=`<tr style="background:#223"><td>TReg</td><td>${x.performance.current.cagrPct}%</td><td>${x.performance.current.upi}</td></tr>`;
  for(let k in x.performance.benchmarks){
    let b=x.performance.benchmarks[k];
    html+=`<tr><td>${k}</td><td>${b.cagrPct}%</td><td>${b.upi}</td></tr>`;
  }
  document.getElementById("table").innerHTML=html;

  document.getElementById("metrics").innerHTML=
    `Sharpe ${x.performance.current.sharpe}<br>
     Sortino ${x.performance.current.sortino}<br>
     Ulcer ${x.performance.current.ulcer}`;

  document.getElementById("eq").src=x.equityFilename+"?t="+Date.now();
  document.getElementById("ra").src=x.ratioFilename+"?t="+Date.now();

  let a="";
  for(let k in x.allocations){
    let v=x.allocations[k]*100;
    a+=`${k} ${v.toFixed(0)}%<div class="bar"><div class="bar-fill" style="width:${v}%"></div></div>`;
  }
  document.getElementById("alloc").innerHTML=a;

  document.getElementById("r").innerText=x.ratio;
  document.getElementById("ma").innerText=x.ratioMA;
  document.getElementById("d").innerText=x.ratioDelta;
  document.getElementById("reason").innerText=x.signal_reason;
}

async function load(){
  let r=await fetch(file+"?t="+Date.now());
  let j=await r.json();
  render(j);
}

setInterval(load,10000);
load();

let z=document.getElementById("zoom");
document.getElementById("eq").onclick=e=>{z.style.display="flex";zoomImg.src=e.target.src;}
document.getElementById("ra").onclick=e=>{z.style.display="flex";zoomImg.src=e.target.src;}
z.onclick=()=>{z.style.display="none";}
</script>

</body>
</html>
