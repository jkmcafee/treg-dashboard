```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TurboRegime - Dashboard</title>

<link rel="stylesheet" href="styles.css">

<style>

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
}

.header h1 {
  margin: 0;
  color: var(--white);
}

.card {
  background: var(--panel);
  padding: 14px 16px;
  border-radius: 12px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

.regime-card {
  border: 1px solid var(--border);
}

.trade-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-top: 8px;
}

.trade-card {
  background: var(--panel-soft);
  padding: 8px 6px;
  border-radius: 10px;
  text-align: center;
  border: 1px solid var(--border);
}

.trade-card .label {
  font-size: 11px;
  color: var(--muted);
}

.trade-card .value {
  font-size: 18px;
  font-weight: bold;
  margin-top: 3px;
  color: var(--text);
}

</style>
</head>

<body>

<div class="card">

  <h3>Active Trade</h3>

  <div class="trade-grid">

    <div class="trade-card">
      <div class="label">Return</div>
      <div id="t_return" class="value"></div>
    </div>

    <div class="trade-card">
      <div class="label">Peak</div>
      <div id="t_peak" class="value"></div>
    </div>

    <div id="captureCard" class="trade-card">
      <div class="label">Capture</div>
      <div id="t_capture" class="value"></div>
    </div>

    <div class="trade-card">
      <div class="label">Max DD</div>
      <div id="t_dd" class="value"></div>
    </div>

    <div class="trade-card">
      <div class="label">Trading Days</div>
      <div id="t_days" class="value"></div>
    </div>

  </div>

</div>

<script>

function render(x) {

  const regime = (x.regime || "").trim();

  const isTurbo = regime.includes("++");

  const gain =
    x.regimeGain ?? 0;

  const peak =
    x.regimePeak ?? 0;

  const capture =
    x.regimePeakCapture ?? 0;

  const dd =
    x.regimeMaxDD ?? 0;

  document.getElementById("t_return")
    .innerText =
    (gain * 100).toFixed(2) + "%";

  document.getElementById("t_peak")
    .innerText =
    (peak * 100).toFixed(2) + "%";

  const captureCard =
    document.getElementById("captureCard");

  const showCapture =
    isTurbo && peak > 0;

  captureCard.style.display =
    showCapture ? "block" : "none";

  document.getElementById("t_capture")
    .innerText =
    showCapture
      ? (capture * 100).toFixed(1) + "%"
      : "--";

  document.getElementById("t_dd")
    .innerText =
    (dd * 100).toFixed(2) + "%";

  document.getElementById("t_days")
    .innerText =
    x.regimeDays ?? "--";
}

</script>

</body>
</html>
